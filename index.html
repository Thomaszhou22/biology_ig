#question-count-field { margin-bottom: 10px; }

// === State ===
let deepQuestions = [];
let selectedQuestionCount = 0;
let activeChapters = [];
let currentQuestionItem = null;
let isAnswering = false;
let questionIndex = 0;
let totalCorrect = 0;
let totalWrong = 0;

// === Progress persistence ===
const PROGRESS_KEY = 'ig-quiz-progress';
function saveProgress() {
    try {
        const itemIdx = deepQuestions.indexOf(currentQuestionItem);
        localStorage.setItem(PROGRESS_KEY, JSON.stringify({
            deepQuestions, questionIndex, totalCorrect, totalWrong, currentQuestionItemIndex: itemIdx >= 0 ? itemIdx : 0
        }));
    } catch(e) {}
}
function loadProgress() {
    try {
        const raw = localStorage.getItem(PROGRESS_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
    } catch(e) { return null; }
}
function clearProgress() {
    try { localStorage.removeItem(PROGRESS_KEY); } catch(e) {}
}
function abortQuiz() {
    clearProgress();
    deepQuestions = []; currentQuestionItem = null; isAnswering = false;
    questionIndex = 0; totalCorrect = 0; totalWrong = 0;
    document.getElementById('progress-bar').style.display = 'none';
    document.getElementById('score-display').style.display = 'none';
    document.getElementById('question-counter').textContent = '请选择题库开始答题';
    document.getElementById('q-text').textContent = '请点击下方按钮选择题库';
    document.getElementById('q-image').style.display = 'none';
    document.getElementById('zoom-hint').style.display = 'none';
    document.getElementById('options').innerHTML = '';
    document.getElementById('abort-btn').style.display = 'none';
    hideMsg(); hideFinishOverlay();
}

// === Load questions ===
function loadQuestionsFromChapters(chapterIds, maxCount) {
    deepQuestions = [];
    activeChapters = chapterIds;

    // Build wrong-book stats for weighted selection
    const wrongRecords = getWrongBook();
    const wrongByQuestion = {}; // question path → count
    const wrongByChapter = {};  // chapter id → count
    for (const r of wrongRecords) {
        const qPath = r.question || '';
        wrongByQuestion[qPath] = (wrongByQuestion[qPath] || 0) + 1;
        // Extract chapter id from path like "ch1/q01.jpg"
        const chId = qPath.split('/')[0];
        if (chapterIds.includes(chId)) {
            wrongByChapter[chId] = (wrongByChapter[chId] || 0) + 1;
        }
    }
    const totalWrongInChapters = Object.values(wrongByChapter).reduce((s, c) => s + c, 0) || 1;

    // Collect all candidate questions grouped by chapter
    const chapterBuckets = {}; // chId → [questions]
    for (const ch of QUESTION_CHAPTERS) {
        if (!chapterIds.includes(ch.id)) continue;
        chapterBuckets[ch.id] = [];
        const count = ch.count || 0;
        for (let i = 1; i <= count; i++) {
            const num = String(i).padStart(2, '0');
            const qPath = ch.id + '/q' + num + '.jpg';
            const ans = ch.answers ? ch.answers[i - 1] : null;
            // Weight: questions wrong before get 3x weight, otherwise 1x
            const qWeight = (wrongByQuestion[qPath] || 0) > 0 ? 3 : 1;
            chapterBuckets[ch.id].push({
                q: qPath,
                img: true,
                a: ans ? ans.a : '?',
                chapter: ch.name,
                _weight: qWeight
            });
        }
    }

    // Calculate per-chapter allocation based on wrong ratios
    // Base: equal share. Boost: proportional to wrong count.
    const totalQuestions = Object.values(chapterBuckets).reduce((s, arr) => s + arr.length, 0);
    const limit = maxCount > 0 ? Math.min(maxCount, totalQuestions) : totalQuestions;

    // Weighted chapter allocation
    const chapterAlloc = {}; // chId → how many questions to pick
    let allocRemaining = limit;
    const chIds = Object.keys(chapterBuckets);

    if (totalWrongInChapters > 1) {
        // Mix: 60% base (equal) + 40% wrong-proportional
        const baseShare = limit * 0.6 / chIds.length;
        let wrongBudget = limit * 0.4;
        chIds.forEach(id => {
            const wrongRatio = (wrongByChapter[id] || 0) / totalWrongInChapters;
            const wrongAlloc = wrongBudget * wrongRatio;
            chapterAlloc[id] = Math.round(baseShare + wrongAlloc);
        });
        // Normalize to exactly match limit
        let allocTotal = Object.values(chapterAlloc).reduce((s, v) => s + v, 0);
        const diff = allocTotal - limit;
        if (diff !== 0) {
            // Adjust largest allocation first
            const sorted = chIds.slice().sort((a, b) => chapterAlloc[b] - chapterAlloc[a]);
            let remaining = diff;
            for (const id of sorted) {
                if (remaining === 0) break;
                const adjust = remaining > 0 ? -Math.min(remaining, Math.max(0, chapterAlloc[id] - 1)) : Math.min(-remaining, chapterBuckets[id].length - chapterAlloc[id]);
                chapterAlloc[id] += adjust;
                remaining -= adjust;
            }
        }
    } else {
        // No wrong history, equal allocation
        chIds.forEach(id => { chapterAlloc[id] = Math.ceil(limit / chIds.length); });
        // Trim excess
        let allocTotal = Object.values(chapterAlloc).reduce((s, v) => s + v, 0);
        while (allocTotal > limit) {
            for (const id of chIds) {
                if (allocTotal <= limit) break;
                if (chapterAlloc[id] > 0) { chapterAlloc[id]--; allocTotal--; }
            }
        }
    }

    // Cap each chapter alloc to available questions
    chIds.forEach(id => {
        chapterAlloc[id] = Math.min(chapterAlloc[id], chapterBuckets[id].length);
    });

    // Pick questions per chapter using weighted random (no duplicates)
    for (const chId of chIds) {
        const pool = chapterBuckets[chId].slice(); // copy
        let needed = chapterAlloc[chId];

        // Weighted shuffle: sort by weight descending with randomness
        // Use weighted random sampling without replacement
        const picked = [];
        const remaining = pool.slice();
        while (picked.length < needed && remaining.length > 0) {
            const totalW = remaining.reduce((s, q) => s + q._weight, 0);
            let r = Math.random() * totalW;
            for (let i = 0; i < remaining.length; i++) {
                r -= remaining[i]._weight;
                if (r <= 0) {
                    picked.push(remaining[i]);
                    remaining.splice(i, 1);
                    break;
                }
            }
        }
        deepQuestions.push(...picked);
    }

    // Final shuffle (mix chapters together)
    for (let i = deepQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deepQuestions[i], deepQuestions[j]] = [deepQuestions[j], deepQuestions[i]];
    }
}

// === Chapter selection UI ===
function renderChapterList() {
    const container = document.getElementById('chapter-list');
    if (!QUESTION_CHAPTERS.length) {
        container.innerHTML = '<div class="no-chapters-msg">暂无题库章节。</div>';
        document.getElementById('question-count-info').textContent = '';
        return;
    }
    container.innerHTML = QUESTION_CHAPTERS.map(ch => {
        return `<div class="chapter-item" data-id="${ch.id}">
            <input type="checkbox" id="ch-${ch.id}" value="${ch.id}">
            <span class="ch-name">${ch.name}</span>
            <span class="ch-count">${ch.count || 0} 题</span>
        </div>`;
    }).join('');
    container.querySelectorAll('.chapter-item').forEach(item => {
        item.addEventListener('click', (e) => {
            if (e.target.tagName === 'INPUT') return;
            const cb = item.querySelector('input[type=checkbox]');
            cb.checked = !cb.checked;
            item.classList.toggle('selected', cb.checked);
            updateChapterCountInfo();
        });
        item.querySelector('input[type=checkbox]').addEventListener('change', (e) => {
            item.classList.toggle('selected', e.target.checked);
            updateChapterCountInfo();
        });
    });
    document.getElementById('sel-all-chapters').onclick = () => {
        container.querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = true; });
        container.querySelectorAll('.chapter-item').forEach(el => el.classList.add('selected'));
        updateChapterCountInfo();
    };
    document.getElementById('sel-none-chapters').onclick = () => {
        container.querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = false; });
        container.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('selected'));
        updateChapterCountInfo();
    };
    updateChapterCountInfo();
}

function updateChapterCountInfo() {
    const checked = document.querySelectorAll('#chapter-list input[type=checkbox]:checked');
    let total = 0;
    checked.forEach(cb => {
        const ch = QUESTION_CHAPTERS.find(c => c.id === cb.value);
        if (ch) total += (ch.count || 0);
    });
    const info = document.getElementById('question-count-info');
    const countInput = document.getElementById('q-count-input');
    if (total === 0) {
        info.textContent = '请至少选择一个章节';
    } else {
        info.textContent = `已选 ${total} 道题，留空则使用全部`;
    }
    countInput.max = total || 999;
}

function openChapterModal() {
    renderChapterList();
    document.getElementById('chapter-modal').style.display = 'flex';
    document.getElementById('chapter-modal').setAttribute('aria-hidden', 'false');
    document.getElementById('chapter-modal-warning').textContent = '';
}

function closeChapterModal() {
    document.getElementById('chapter-modal').style.display = 'none';
    document.getElementById('chapter-modal').setAttribute('aria-hidden', 'true');
}

function confirmChapterSelection() {
    const w = document.getElementById('chapter-modal-warning');
    const checked = document.querySelectorAll('#chapter-list input[type=checkbox]:checked');
    if (checked.length === 0) {
        w.textContent = '请至少选择一个章节！';
        return;
    }
    const chapterIds = Array.from(checked).map(cb => cb.value);
    const maxCount = parseInt(document.getElementById('q-count-input').value) || 0;
    if (maxCount < 0) {
        w.textContent = '题量不能为负数';
        return;
    }
    let total = 0;
    chapterIds.forEach(id => {
        const ch = QUESTION_CHAPTERS.find(c => c.id === id);
        if (ch) total += (ch.count || 0);
    });
    if (maxCount > total) {
        w.textContent = `题量（${maxCount}）超过已选总题数（${total}）`;
        return;
    }
    selectedQuestionCount = maxCount;
    loadQuestionsFromChapters(chapterIds, maxCount);
    w.textContent = '';
    closeChapterModal();
    preloadImagesAndStart();
}

function preloadImagesAndStart() {
    const overlay = document.getElementById('preload-overlay');
    const fill = overlay.querySelector('.preload-fill');
    const text = overlay.querySelector('.preload-text');
    overlay.style.display = 'flex';
    // Disable all buttons
    document.querySelectorAll('button').forEach(b => b.disabled = true);

    const total = deepQuestions.length;
    let loaded = 0;
    if (total === 0) {
        overlay.style.display = 'none';
        document.querySelectorAll('button').forEach(b => b.disabled = false);
        startQuiz();
        return;
    }
    deepQuestions.forEach(item => {
        if (!item.img) { loaded++; return; }
        const img = new Image();
        img.onload = img.onerror = function() {
            loaded++;
            const pct = Math.round((loaded / total) * 100);
            fill.style.width = pct + '%';
            text.textContent = '已加载 ' + loaded + ' / ' + total;
            if (loaded === total) {
                overlay.style.display = 'none';
                document.querySelectorAll('button').forEach(b => b.disabled = false);
                startQuiz();
            }
        };
        img.src = 'questions/' + item.q.replace('\n', '');
    });
}

function startQuiz() {
    questionIndex = 0;
    totalCorrect = 0;
    totalWrong = 0;
    document.getElementById('progress-bar').style.display = 'block';
    document.getElementById('score-display').style.display = 'flex';
    hideFinishOverlay();
    updateScoreDisplay();
    document.getElementById('abort-btn').style.display = 'block';
    saveProgress();
    showNextQuestion();
}

function showNextQuestion() {
    if (questionIndex >= deepQuestions.length) {
        showFinishOverlay();
        return;
    }
    isAnswering = true;
    currentQuestionItem = deepQuestions[questionIndex];
    renderCurrentQuestion();
    updateScoreDisplay();
}

function renderCurrentQuestion() {
    const item = currentQuestionItem;
    if (!item) return;
    document.getElementById('question-counter').textContent = `第 ${questionIndex + 1} / ${deepQuestions.length} 题`;
    document.getElementById('q-text').innerHTML = `<b>Q${questionIndex + 1}：</b>`;

    const qImg = document.getElementById('q-image');
    const hint = document.getElementById('zoom-hint');
    if (item.img) {
        qImg.src = 'questions/' + item.q.replace('\n', '');
        qImg.style.display = 'block';
        if (hint) hint.style.display = 'block';
    } else {
        qImg.style.display = 'none';
        if (hint) hint.style.display = 'none';
    }

    const opt = document.getElementById('options');
    opt.innerHTML = '';
    const row = document.createElement('div');
    row.className = 'options-row';
    ['A', 'B', 'C', 'D'].forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = letter;
        btn.onclick = () => handleAnswer(letter, btn);
        opt.appendChild(btn);
    });
}

function handleAnswer(letter, clickedBtn) {
    if (!isAnswering) return;
    isAnswering = false;

    const qItem = currentQuestionItem;
    const correct = letter === qItem.a;

    // Disable all buttons and highlight
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(b => {
        b.disabled = true;
        if (b.textContent === qItem.a) b.classList.add('correct-answer');
    });

    if (correct) {
        totalCorrect++;
        showMsg('✅ 正确！', 'correct');
    } else {
        totalWrong++;
        clickedBtn.classList.add('wrong-answer');
        showMsg(`❌ 错误！正确答案是: ${qItem.a}`, 'incorrect');
        addWrongQuestionRecord(qItem, questionIndex + 1);
    }

    updateScoreDisplay();

    // Auto-advance after delay
    setTimeout(() => {
        hideMsg();
        questionIndex++;
        showNextQuestion();
        saveProgress();
    }, 1500);
}

function updateScoreDisplay() {
    const total = totalCorrect + totalWrong;
    const remaining = deepQuestions.length - questionIndex;
    document.getElementById('correct-count').textContent = totalCorrect;
    document.getElementById('wrong-count').textContent = totalWrong;
    document.getElementById('remaining-count').textContent = remaining;
    const pct = deepQuestions.length > 0 ? Math.round((total / deepQuestions.length) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
}

function showMsg(t, c) {
    const m = document.getElementById('msg');
    m.textContent = t; m.className = 'status-msg ' + c; m.style.display = 'block';
}

function hideMsg() {
    document.getElementById('msg').style.display = 'none';
}

// === Finish overlay ===
function showFinishOverlay() {
    const total = totalCorrect + totalWrong;
    const acc = total > 0 ? Math.round((totalCorrect / total) * 100) + '%' : '—';
    document.getElementById('finish-total').textContent = total;
    document.getElementById('finish-correct').textContent = totalCorrect;
    document.getElementById('finish-wrong').textContent = totalWrong;
    document.getElementById('finish-acc').textContent = acc;
    document.getElementById('finish-overlay').style.display = 'flex';
    document.getElementById('finish-overlay').setAttribute('aria-hidden', 'false');
}

function hideFinishOverlay() {
    document.getElementById('finish-overlay').style.display = 'none';
    document.getElementById('finish-overlay').setAttribute('aria-hidden', 'true');
}

document.getElementById('finish-restart-btn').onclick = () => {
    clearProgress();
    document.getElementById('abort-btn').style.display = 'none';
    hideFinishOverlay();
    openChapterModal();
};

// === Zoom image ===
function zoomImage(src) {
    const overlay = document.createElement('div');
    overlay.className = 'image-overlay';
    overlay.onclick = () => overlay.remove();
    const img = document.createElement('img');
    img.src = src;
    overlay.appendChild(img);
    document.body.appendChild(overlay);
}

// === Wrong book ===
const WRONG_BOOK_KEY = 'ig-quiz-wrong-book';

function getWrongBook() {
    try { return JSON.parse(localStorage.getItem(WRONG_BOOK_KEY) || '[]'); } catch { return []; }
}

function saveWrongBook(records) {
    try { localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(records)); } catch (e) {}
}

function addWrongQuestionRecord(qItem, qNumber) {
    if (!qItem) return;
    const records = getWrongBook();
    records.push({
        question: qItem.q,
        img: !!qItem.img,
        questionIndex: qNumber,
        answer: qItem.a,
        timestamp: Date.now()
    });
    saveWrongBook(records);
}

function escapeHtml(str) {
    return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}

function renderWrongBook() {
    const container = document.getElementById('wrong-book-list');
    const records = getWrongBook();
    if (!records.length) {
        container.innerHTML = '<p>暂无错题。</p>';
        return;
    }
    container.innerHTML = '<div class="wrong-book-section"><div class="wrong-book-section-title">全部错题<span class="wrong-book-count">共 ' + records.length + ' 题</span></div><div class="wrong-book-section-items">' +
        records.map((item, i) => `
      <div class="wrong-book-item">
        <div class="wrong-book-meta"><strong>#${i + 1}</strong></div>
        <div class="wrong-book-question"><strong>Q${item.questionIndex || '?'}:</strong> ${item.img ? '<img src="questions/' + escapeHtml(item.question) + '" style="max-width:200px;border-radius:4px;cursor:zoom-in;" onclick="zoomImage(this.src)">' : escapeHtml(item.question)}</div>
        <div class="wrong-book-answer"><strong>正确答案:</strong> ${escapeHtml(item.answer)}</div>
      </div>
    `).join('') + '</div></div>';
}

function openWrongBook() {
    renderWrongBook();
    const o = document.getElementById('wrong-book-overlay');
    o.style.display = 'flex'; o.setAttribute('aria-hidden', 'false');
}
function closeWrongBook() {
    const o = document.getElementById('wrong-book-overlay');
    o.style.display = 'none'; o.setAttribute('aria-hidden', 'true');
}
function clearAllWrongBook() {
    if (!window.confirm('确定要清空错题本中的全部记录吗？\n此操作无法撤销。')) return;
    saveWrongBook([]); renderWrongBook();
}

// === Admin ===

// === Event bindings ===
document.getElementById('start-game-btn2').onclick = confirmChapterSelection;
document.getElementById('back-to-names-btn').onclick = closeChapterModal;
document.getElementById('reselect-chapters-btn').onclick = () => { clearProgress(); document.getElementById('abort-btn').style.display = 'none'; openChapterModal(); };
document.getElementById('abort-btn').onclick = abortQuiz;
document.getElementById('wrong-book-btn').onclick = openWrongBook;
document.getElementById('wrong-book-clear-all').onclick = clearAllWrongBook;
document.getElementById('wrong-book-close').onclick = closeWrongBook;
document.getElementById('wrong-book-panel').addEventListener('click', (e) => e.stopPropagation());
document.getElementById('wrong-book-overlay').addEventListener('click', closeWrongBook);
// === Restore progress on boot ===
(function bootQuiz() {
    const saved = loadProgress();
    if (saved && saved.deepQuestions && saved.deepQuestions.length > 0) {
        deepQuestions = saved.deepQuestions;
        questionIndex = saved.questionIndex || 0;
        totalCorrect = saved.totalCorrect || 0;
        totalWrong = saved.totalWrong || 0;
        document.getElementById('progress-bar').style.display = 'block';
        document.getElementById('score-display').style.display = 'flex';
        document.getElementById('abort-btn').style.display = 'block';
        if (questionIndex >= deepQuestions.length) {
            showFinishOverlay();
        } else {
            currentQuestionItem = deepQuestions[questionIndex];
            isAnswering = true;
            renderCurrentQuestion();
            updateScoreDisplay();
        }
    }
})();

document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    const wb = document.getElementById('wrong-book-overlay');
    if (wb && wb.style.display === 'flex') { closeWrongBook(); return; }
    const ch = document.getElementById('chapter-modal');
    if (ch && ch.style.display === 'flex') { closeChapterModal(); return; }
});

</script>
